# Reverse proxy: public entrypoint on port 80 -> Next.js app on web:3000.
upstream fulfillmesh_app {
    server web:3000;
}

server {
    listen 80;
    server_name _;

    # Reasonable upload ceiling for form/API payloads.
    client_max_body_size 10m;

    # Let Next.js serve its hashed static assets with long-lived caching.
    location /_next/static/ {
        proxy_pass http://fulfillmesh_app;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        proxy_pass http://fulfillmesh_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
