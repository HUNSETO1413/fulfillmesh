services:
  web:
    build: .
    container_name: fulfillmesh
    ports:
      - "3000:3000"
    environment:
      # Signs session cookies. Change to a long random value for any real deployment.
      - AUTH_SECRET=local-dev-secret-change-me-in-production
    volumes:
      # Persist the SQLite database across container restarts/rebuilds.
      - fulfillmesh-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  fulfillmesh-data:
